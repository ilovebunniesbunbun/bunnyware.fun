<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bunnyware - Radar</title>
    <link rel="icon" href="rabbit-silhouette.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <style>
        .radar-viewer {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 20px 20px;
            background: #1a1a1a;
        }

        .radar-display {
            max-width: 800px;
            width: 100%;
            background: #b9e0c8e6;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 24px #b9e0c8e6;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        #image-wrapper {
            position: relative;
            display: inline-block;
            overflow: hidden;
            border-radius: 8px;
            background: rgb(54, 54, 54);
            /* Very subtle background */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            min-height: 300px;
            /* Prevent collapse */
            min-width: 300px;
        }

        #radar-image {
            width: auto;
            max-height: 70vh;
            max-width: 100%;
            display: block;
            border-radius: 8px;
        }

        .map-name {
            font-size: 2.3rem;
            color: #ffffff;
            margin-bottom: 0.8rem;
            text-transform: capitalize;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .refresh-button {
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            background: #1a2f23;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin-top: 10px;
        }

        .refresh-button:hover {
            transform: scale(1.05);
            background: #2d4f3b;
        }

        .bunny {
            position: absolute;
            width: 50px;
            height: 50px;
            pointer-events: none;
            z-index: 5;
            transition: transform 0.05s linear, opacity 0.5s ease;
            top: 0;
            left: 0;
        }

        .bunny.dead {
            opacity: 0;
        }

        /* Mobile responsive for radar */
        @media (max-width: 768px) {
            .radar-viewer {
                padding: 80px 10px 10px 10px;
            }

            .radar-display {
                padding: 12px;
                border-radius: 8px;
            }

            .map-name {
                font-size: 1.6rem;
            }

            #image-wrapper {
                min-height: 200px;
                min-width: 200px;
            }

            #radar-image {
                max-height: 55vh;
            }

            .refresh-button {
                padding: 0.7rem 1.5rem;
                font-size: 1rem;
            }

            .bunny {
                width: 35px;
                height: 35px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="logo">
            <img src="rabbit-silhouette.svg" alt="logo" class="nav-logo-img">
            bunnyware
        </a>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">home</a></li>
            <li><a href="index.html#features">features</a></li>
            <li><a href="index.html#pricing">pricing</a></li>
            <li><a href="radar.html">radar</a></li>
            <li><a href="https://stats.bunnyware.fun">stats</a></li>
            <li><a href="https://search.bunnyware.fun">search</a></li>
        </ul>
    </nav>

    <div class="radar-viewer">
        <div class="radar-display">
            <h2 id="map-name" class="map-name">Loading...</h2>
            <div id="image-wrapper">
                <img id="radar-image" src="" alt="Radar Map">
            </div>
            <div>
                <button class="refresh-button" onclick="loadRandomRadar()">Switch Map</button>
            </div>
        </div>
    </div>

    <!-- Collision Data -->
    <script src="masks.js"></script>

    <script>
        const maps = [
            'de_ancient_radar.png',
            'de_anubis_radar.png',
            'de_cache_radar.png',
            'de_dust2_radar.png',
            'de_inferno_radar.png',
            'de_mirage_radar.png',
            'de_nuke_radar.png',
            'de_overpass_radar.png',
            'de_train_radar.png',
            'de_vertigo_radar.png'
        ];

        let bunnies = [];
        const numBunnies = 10;
        const radarImg = document.getElementById('radar-image');
        const wrapper = document.getElementById('image-wrapper');
        let radarBounds = { width: 0, height: 0 };
        let currentMapFile = "";
        let isResetting = false;

        function isPointVisible(x, y) {
            if (typeof RADAR_MASKS === 'undefined' || !currentMapFile) return true;
            const mask = RADAR_MASKS[currentMapFile];
            if (!mask) return x > 0 && x < radarBounds.width && y > 0 && y < radarBounds.height;

            const gridX = Math.floor((x / radarBounds.width) * 40);
            const gridY = Math.floor((y / radarBounds.height) * 40);

            if (gridX < 0 || gridX >= 40 || gridY < 0 || gridY >= 40) return false;

            const index = gridY * 40 + gridX;
            return mask[index] === '1';
        }

        function createBunnies() {
            const old = wrapper.querySelectorAll('.bunny');
            old.forEach(el => el.remove());
            bunnies = [];

            for (let i = 0; i < numBunnies; i++) {
                const bun = document.createElement('img');
                bun.src = 'baby_bun.png';
                bun.className = 'bunny';
                wrapper.appendChild(bun);

                let spawnX = radarBounds.width / 2;
                let spawnY = radarBounds.height / 2;

                for (let attempt = 0; attempt < 100; attempt++) {
                    const tx = Math.random() * radarBounds.width;
                    const ty = Math.random() * radarBounds.height;
                    if (isPointVisible(tx, ty)) {
                        spawnX = tx;
                        spawnY = ty;
                        break;
                    }
                }

                bunnies.push({
                    el: bun,
                    x: spawnX,
                    y: spawnY,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    flip: 1,
                    radius: 18,
                    dead: false
                });
            }
            isResetting = false;
        }

        function loadRandomRadar() {
            const randomIndex = Math.floor(Math.random() * maps.length);
            const selectedMap = maps[randomIndex];
            currentMapFile = selectedMap;
            const mapTitle = selectedMap.replace('_radar.png', '').replace('de_', '').replace('_', ' ');

            radarImg.src = 'radars/' + selectedMap;
            document.getElementById('map-name').innerText = mapTitle;

            radarImg.onload = () => {
                radarBounds.width = radarImg.clientWidth;
                radarBounds.height = radarImg.clientHeight;
                createBunnies();
            };
        }

        function handleCollisions() {
            const alive = bunnies.filter(b => !b.dead);
            if (alive.length <= 1 && !isResetting) {
                isResetting = true;
                setTimeout(loadRandomRadar, 1500);
                return;
            }

            for (let i = 0; i < alive.length; i++) {
                for (let j = i + 1; j < alive.length; j++) {
                    const b1 = alive[i];
                    const b2 = alive[j];
                    const dx = b1.x - b2.x;
                    const dy = b1.y - b2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < (b1.radius + b2.radius)) {
                        const victim = Math.random() > 0.5 ? b1 : b2;
                        victim.dead = true;
                        victim.el.src = 'dead_bun.png';
                        victim.el.classList.add('dead');
                        return;
                    }
                }
            }
        }

        function updateBunnies() {
            if (radarBounds.width > 0 && !isResetting) {
                bunnies.forEach(bun => {
                    if (bun.dead) return;
                    let nextX = bun.x + bun.vx;
                    let nextY = bun.y + bun.vy;

                    if (!isPointVisible(nextX, nextY)) {
                        bun.vx = (Math.random() - 0.5) * 3;
                        bun.vy = (Math.random() - 0.5) * 3;
                    } else {
                        bun.x = nextX;
                        bun.y = nextY;
                    }

                    if (bun.vx > 0) bun.flip = 1; else if (bun.vx < 0) bun.flip = -1;
                    const hop = Math.abs(Math.sin(Date.now() / 250)) * 4;
                    bun.el.style.transform = `translate(${bun.x - 25}px, ${bun.y - 25 - hop}px) scaleX(${bun.flip})`;
                });
                handleCollisions();
            }
            requestAnimationFrame(updateBunnies);
        }

        loadRandomRadar();
        updateBunnies();
    </script>

    <script>
        // Hamburger Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.querySelector('.nav-links');

        if (hamburger && navLinks) {
            hamburger.addEventListener('click', function () {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('open');
            });

            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    navLinks.classList.remove('open');
                });
            });
        }
    </script>
</body>

</html>
